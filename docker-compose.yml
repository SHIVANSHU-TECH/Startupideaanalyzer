# Docker Compose for development environment
version: '3.8'

services:
  # Redis for rate limiting (optional)
  redis:
    image: redis:alpine
    container_name: startup-analyzer-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  # Next.js application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: startup-analyzer-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - JWT_SECRET=your-super-secret-jwt-key-here-make-it-long-and-random
      - OPENAI_API_KEY=your-openai-api-key-here
      - FRONTEND_URL=http://localhost:3000
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
      # Firebase configuration should be added here
      - FIREBASE_ADMIN_PROJECT_ID=your-firebase-project-id
      - FIREBASE_ADMIN_CLIENT_EMAIL=your-firebase-client-email
      - FIREBASE_ADMIN_PRIVATE_KEY=your-firebase-private-key
    ports:
      - "3000:3000"
    depends_on:
      - redis
    networks:
      - app-network
    volumes:
      - /app/node_modules
      - .:/app

  # MongoDB Express (for database management - development only)
  mongo-express:
    image: mongo-express
    container_name: startup-analyzer-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_URL: mongodb://admin:password123@mongodb:27017/
    ports:
      - "8081:8081
    networks:
      - app-network
    profiles:
      - development

volumes:
  redis_data:

networks:
  app-network:
    driver: bridge